services:
  django:
    build: ./
    command: gunicorn stem_learning_app.config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_volume:/app/static
    ports:
      - "8000:8000"
    env_file:
      - stem_learning_app/.env/dev
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  celery:
    build: ./
    command: celery -A stem_learning_app worker -l info
    depends_on:
      - rabbitmq
      - postgres

volumes:
  postgres_data:
  static_volume: