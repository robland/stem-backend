services:
  - type: web
    plan: free
    name: stem-backend
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'pwd && poetry run python -m gunicorn ./stem_learning_app.config.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: WEB_CONCURRENCY
        value: 4